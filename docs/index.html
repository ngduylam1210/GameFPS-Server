<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 FPS Controller — Pro Dashboard V2.7</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<style>
/* Giữ nguyên CSS cũ */
*{box-sizing:border-box;margin:0;padding:0}
/* ... CSS giống V2.6 ... */
.offline{opacity:0.4;background:rgba(207,102,121,.1)!important;border-color:#cf6679!important}
.offline .val{color:#666!important}
</style>
</head>
<body>
<!-- HTML giống V2.6, chỉ thêm class="status-offline" vào các card cần reset -->
<div class="card status-offline">
<!-- ... -->
</div>
</body>

<script>
// ─────────────────────────────────────────────────────────
// OFFLINE DETECTION + AUTO RESET
// ─────────────────────────────────────────────────────────
let lastValidData = null;
let offlineCount = 0;
const OFFLINE_TIMEOUT = 3000; // 3s không data = OFFLINE

// ─────────────────────────────────────────────────────────
// RESET ALL TO INITIAL STATE
// ─────────────────────────────────────────────────────────
function resetToInitial() {
  console.log('🔄 RESET DASHBOARD - NO CONNECTION');
  
  // 1. Góc → "—"
  ['v-pitch','v-roll','v-yaw'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
  
  // 2. 3D → Vị trí gốc (0,0,0)
  if (cube) cube.rotation.set(0, 0, 0);
  
  // 3. Charts → Clear data
  labels.length = 0; dPitch.length = 0; dRoll.length = 0; 
  dYaw.length = 0; dDrift.length = 0; dTemp.length = 0;
  angleChart.update('none');
  driftChart.update('none');
  tempChart.update('none');
  
  // 4. Metrics → "—"
  document.getElementById('v-uptime').textContent = '--:--:--';
  document.getElementById('v-latency').textContent = '— ms';
  document.getElementById('v-pps').textContent = '—';
  document.getElementById('v-temp').textContent = '—°C';
  
  // 5. Status → Offline
  setDot('sd-esp', false);
  setDot('sd-server', false);
  document.getElementById('st-esp').textContent = 'ESP32 Offline';
  document.getElementById('st-server').textContent = 'Server Offline';
  document.getElementById('st-mqtt').textContent = 'MQTT Offline';
  document.getElementById('st-fps').textContent = '— pkt/s';
  document.getElementById('st-latency').textContent = '— ms';
  
  // 6. Visual feedback
  document.querySelectorAll('.status-offline').forEach(el => {
    el.classList.add('offline');
  });
  
  pktCount = 0; lastPktCount = 0;
}

// ─────────────────────────────────────────────────────────
// ONLINE VALIDATION
// ─────────────────────────────────────────────────────────
function validateData(d) {
  return d && typeof d.pitch === 'number' && 
         typeof d.roll === 'number' && 
         typeof d.yaw === 'number' &&
         !isNaN(d.pitch) && !isNaN(d.roll) && !isNaN(d.yaw);
}

// ─────────────────────────────────────────────────────────
// FETCH SENSOR - WITH OFFLINE LOGIC
// ─────────────────────────────────────────────────────────
async function fetchSensor() {
  const t0 = Date.now();
  try {
    const res = await fetch(`${API}/api/latest`);
    const d   = await res.json();
    const latency = Date.now() - t0;

    // ✅ VALIDATE DATA
    if (validateData(d)) {
      lastValidData = Date.now();
      offlineCount = 0;
      
      // Update dashboard (giống cũ)
      document.getElementById('v-pitch').textContent = d.pitch.toFixed(1);
      document.getElementById('v-roll').textContent  = d.roll.toFixed(1);
      document.getElementById('v-yaw').textContent   = d.yaw.toFixed(1);
      updateCube(d.pitch, d.roll, d.yaw);
      
      // Charts...
      const ts = new Date().toLocaleTimeString('vi-VN', {hour12:false}).slice(-8);
      pushData(labels, ts);
      pushData(dPitch, d.pitch);
      pushData(dRoll,  d.roll);
      pushData(dYaw,   d.yaw);
      pushData(dDrift, d.yaw);
      
      angleChart.update('none');
      driftChart.data.labels = labels.slice(-10);
      driftChart.update('none');

      // Status ONLINE
      setDot('sd-esp', true);
      setDot('sd-server', true);
      document.getElementById('st-esp').textContent = 'ESP32 Online';
      document.getElementById('st-server').textContent = 'Server Online';
      
      document.getElementById('v-latency').textContent = latency + ' ms';
      document.getElementById('st-latency').textContent = latency + ' ms';
      
      pktCount++;
      
      // Visual ONLINE
      document.querySelectorAll('.status-offline').forEach(el => {
        el.classList.remove('offline');
      });
      
    } else {
      throw new Error('Invalid data');
    }
    
  } catch(e) {
    offlineCount++;
    
    // 3s không data → FULL RESET
    if (offlineCount * 1000 > OFFLINE_TIMEOUT) {
      resetToInitial();
    }
  }
}

// ─────────────────────────────────────────────────────────
// FETCH HEALTH - WITH OFFLINE
// ─────────────────────────────────────────────────────────
async function fetchHealth() {
  try {
    const res = await fetch(`${API}/api/health`);
    const h   = await res.json();
    
    if (h && h.uptime !== undefined) {
      document.getElementById('v-uptime').textContent = formatUptime(h.uptime);
    }
    
    if (h && h.temperature !== undefined) {
      const t = h.temperature;
      const st = tempStatus(t);
      document.getElementById('v-temp').textContent = t.toFixed(1) + '°C';
      document.getElementById('v-temp-status').textContent = st.text;
      pushData(dTemp, t);
      tempChart.data.labels = dTemp.map((_,i) => i);
      tempChart.update('none');
    }
    
    const mqttOk = h && h.mqttConnected === true;
    setDot('sd-mqtt', mqttOk);
    document.getElementById('st-mqtt').textContent = mqttOk ? 'MQTT OK' : 'MQTT Offline';
    
  } catch(e) {
    // Health offline → Không reset full
  }
}

// ─────────────────────────────────────────────────────────
// AUTO RESET ON PAGE LOAD
// ─────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  resetToInitial();
});

// ─────────────────────────────────────────────────────────
// REST OF CODE (PPS + OTA giống cũ)
// ─────────────────────────────────────────────────────────
setInterval(() => {
  const now  = Date.now();
  const secs = (now - lastPktTime) / 1000;
  const pps  = (pktCount - lastPktCount) / secs;
  lastPktCount = pktCount;
  lastPktTime  = now;
  
  document.getElementById('v-pps').textContent = pps.toFixed(1);
  document.getElementById('st-fps').textContent = pps.toFixed(1) + ' pkt/s';
}, 5000);

async function triggerOTA() { /* Giống cũ */ }

// START
setInterval(fetchSensor, 1000);
setInterval(fetchHealth, 3000);
</script>
</html>
